name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    working-directory: C:\web-relay-controller\app

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Set git safe directory
        run: git config --global --add safe.directory C:/web-relay-controller/app

      - name: Pull latest code
        run: |
          git fetch origin master
          git reset --hard origin/master

      - name: Debug versions
        run: |
          node -v
          pnpm -v
          git status

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tslib
        run: pnpm why tslib

      - name: Restart API
        run: |
          if (pm2 list | Select-String "relay-api") {
            pm2 delete relay-api
          }
          pm2 start apps/api/dist/main.js --name relay-api
          pm2 save

      - name: Generate Prisma Client
        run: pnpm -F @repo/prisma-db prisma:generate

      - name: Build prisma-db
        run: pnpm -F @repo/prisma-db build

      - name: Run DB migrations
        run: pnpm -F @repo/prisma-db prisma:deploy

      - name: Build API
        run: pnpm -F @repo/api build

      - name: Build Web
        run: pnpm -F web build

      - name: Start API
        run: |
          pm2 start apps/api/dist/main.js --name relay-api
          pm2 save

      - name: Reload nginx
        working-directory: C:\nginx
        run: .\nginx.exe -s reload